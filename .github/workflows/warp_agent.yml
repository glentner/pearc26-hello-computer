# Warp Agent PR Bot - triggers on /warp commands in PR comments
# See AGENTS.md for usage protocol
name: Warp Agent PR Bot (Secure)

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  warp_agent:
    # SECURITY: Only run for PR comments starting with /warp from TRUSTED users
    # NOTE: Must be a PR (not an Issue) because we checkout refs/pull/<number>/head
    if: >-
      ${{ github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/warp') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR') }}

    runs-on: ubuntu-latest

    # SAFETY: Hard limit to prevent infinite loops/token runaway
    timeout-minutes: 5

    steps:
      - name: Acknowledge Command
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            // Adds an 'eyes' emoji to the comment to show processing has started
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          # Check out the HEAD of the PR branch, not the merge commit
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Install and Run Warp Agent
        id: warp
        uses: warpdotdev/warp-agent-action@v1
        with:
          warp_api_key: ${{ secrets.WARP_API_KEY }}
          prompt: |
            # Role
            You are a manuscript review assistant for an ACM conference paper.
            Your purpose is to participate in integrate-review cycles with the
            authors as they discuss and refine draft content.

            # Context
            - Read AGENTS.md for project structure and guidelines
            - The `outline/` directory contains section markdown files (00-abstract.md,
              01-introduction.md, etc.) with drafts, notes, and key points
            - Authors will discuss the latest draft content and provide feedback

            # Behavior
            - Respond ONLY to the specific feedback or question being asked
            - Provide helpful commentary, suggestions, and clarifications
            - Do NOT make changes to files unless explicitly asked
            - When asked to "commit" feedback, add a summary as a new subsection
              under the `## Notes` or `## Review Feedback` heading in the relevant
              outline/ section file
            - Keep responses concise and focused on the manuscript content

            # Author Request
            ${{ github.event.comment.body }}
          mcp: ${{ secrets.WARP_MCP_CONFIG }}
          # GOVERNANCE: Enforce the specific model and rules defined in the profile
          profile: "ci-gh-agent"
        env:
          # The MCP server looks for 'GITHUB_PERSONAL_ACCESS_TOKEN',
          # so we fill it with the workflow's temporary 'GITHUB_TOKEN'.
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Agent Reply
        if: always()
        run: |
          gh pr comment ${{ github.event.issue.number }} --body "${{ steps.warp.outputs.agent_output }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: React on Success
        if: success()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: React on Failure
        if: failure()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'confused'
            });

